# pnpm 11 reads non-auth settings from here (NOT .npmrc).

# Use pnpm's default isolated node linker. electron-builder 26's pnpm
# node-modules collector is built for the isolated (.pnpm) layout; forcing
# `nodeLinker: hoisted` made macOS packaging fail with `⨯ <projectDir> not a
# file` during the code-signing walk (electron-userland/electron-builder#9580).

# Baileys depends on `libsignal` (whiskeysockets/libsignal-node), which is only
# distributed as a git dependency. pnpm 11 blocks exotic (git) transitive deps
# by default; allow them so the install can resolve libsignal.
blockExoticSubdeps: false

# Explicitly approve dependency build scripts (pnpm 11 requires opt-in).
allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
  '@biomejs/biome': true
  '@parcel/watcher': true
  app-builder-bin: true
  dmg-license: true
  '@whiskeysockets/baileys': true
  protobufjs: true

# Force a patched esbuild (pulled transitively by vite/electron-vite) to address
# GHSA-gv7w-rqvm-qjhr (RCE in esbuild's Deno installer for < 0.28.1).
overrides:
  esbuild: '>=0.28.1'
