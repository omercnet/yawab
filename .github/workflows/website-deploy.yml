name: Deploy website

# Production deploy of the marketing site to GitHub Pages via the GitHub Actions
# Pages source (build_type=workflow). The site source lives in `website/` on the
# default branch -- there is no gh-pages branch. Runs only when the site changes.
on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/website-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; don't cancel an in-progress deploy
# so a running production publish always finishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: website

      - name: Build (custom domain, base /)
        run: pnpm run build
        working-directory: website
        env:
          VITE_BASE_PATH: /

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
