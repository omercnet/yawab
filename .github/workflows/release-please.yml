name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Manage release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          # Prefer a PAT / GitHub App token (RELEASE_PLEASE_TOKEN) so the release
          # PR and tag it creates trigger CI; fall back to the default token,
          # which works but won't trigger downstream workflows.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build & publish (${{ matrix.os }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build: pnpm run build:mac
          - os: windows-latest
            build: pnpm run build:win
          - os: ubuntu-latest
            build: pnpm run build:linux
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # An unset CSC_LINK secret expands to an empty string, which electron-builder
      # tries to read as a certificate file and dies with `<projectDir> not a file`.
      # Only wire signing when a cert is configured; otherwise skip it cleanly.
      - name: Configure macOS code signing
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            {
              echo "CSC_LINK=$CSC_LINK"
              echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Build & publish to the GitHub release
        run: ${{ matrix.build }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          YAWAB_SENTRY_DSN: ${{ secrets.YAWAB_SENTRY_DSN }}
          YAWAB_SENTRY_ENVIRONMENT: production
          YAWAB_SENTRY_RELEASE: ${{ needs.release-please.outputs.tag_name }}
