name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Manage release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          # Prefer a PAT / GitHub App token (RELEASE_PLEASE_TOKEN) so the release
          # PR and tag it creates trigger CI; fall back to the default token,
          # which works but won't trigger downstream workflows.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build & publish (${{ matrix.os }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    env:
      CSC_LINK: ${{ secrets.MAC_CSC_LINK || secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD || secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      DEBUG: ${{ matrix.os == 'macos-latest' && 'electron-builder,electron-notarize*' || '' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build: pnpm run build:mac
          - os: windows-latest
            build: pnpm run build:win
          - os: ubuntu-latest
            build: pnpm run build:linux
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & publish to the GitHub release
        run: ${{ matrix.build }} --publish always
        env:
          YAWAB_SENTRY_DSN: ${{ secrets.YAWAB_SENTRY_DSN }}
          YAWAB_SENTRY_ENVIRONMENT: production
          YAWAB_SENTRY_RELEASE: ${{ needs.release-please.outputs.tag_name }}

      - name: Verify macOS notarization
        if: ${{ matrix.os == 'macos-latest' }}
        shell: bash
        run: |
          found=0
          for app_path in dist/mac*/Yawab.app; do
            if [ ! -d "$app_path" ]; then
              continue
            fi
            found=1
            spctl --assess --verbose --type exec "$app_path"
            xcrun stapler validate "$app_path"
            codesign --verify --deep --strict --verbose=2 "$app_path"
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No macOS app bundle found to verify"
            exit 1
          fi
