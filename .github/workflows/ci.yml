name: CI

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

      - name: Validate pushed commit
        if: github.event_name == 'push'
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -n "$BEFORE" ] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            pnpm exec commitlint --from "$BEFORE" --to "${{ github.sha }}" --verbose
          else
            echo "Previous commit ($BEFORE) is unavailable (new or force-pushed branch); linting HEAD only."
            pnpm exec commitlint --last --verbose
          fi

  quality:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome (lint + format)
        run: pnpm run check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test with coverage
        run: pnpm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  build:
    name: Build (sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer + main + preload
        run: pnpm run build

      - name: Verify app deps are bundled (zero production deps)
        run: pnpm run verify:bundle

  e2e:
    name: End-to-end (Playwright)
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install fonts (deterministic text/RTL rendering for screenshots)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-core fonts-noto-color-emoji
          sudo fc-cache -f

      - name: Build app
        run: pnpm run build

      - name: Run Playwright E2E (headless via xvfb)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  package:
    name: Package installers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build: pnpm run build:mac
          - os: windows-latest
            build: pnpm run build:win
          - os: ubuntu-latest
            build: pnpm run build:linux
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds the real installers (dmg / nsis / AppImage + deb) without
      # publishing, so every PR proves the release packaging works. We mirror the
      # release's signing setup (Configure step + CSC_FOR_PULL_REQUEST to force the
      # macOS code-signing path) so this job catches release-only signing failures.
      - name: Configure macOS code signing
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            {
              echo "CSC_LINK=$CSC_LINK"
              echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Package installers (no publish)
        run: ${{ matrix.build }} --publish never
        env:
          DEBUG: ${{ matrix.os == 'macos-latest' && 'electron-builder' || '' }}
          CSC_FOR_PULL_REQUEST: 'true'

      - name: Upload installers
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: warn
          retention-days: 7

  pr-build-comment:
    name: Comment build artifacts on PR
    needs: package
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo
            const run_id = context.runId
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${run_id}`
            const arts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, { owner, repo, run_id })
            const installers = arts.filter(a => a.name.startsWith('installers-'))
            const list = installers.length
              ? installers.map(a => `- [\`${a.name}.zip\`](${runUrl}/artifacts/${a.id}) — ${(a.size_in_bytes / 1048576).toFixed(1)} MB`).join('\n')
              : '_No installer artifacts were produced by this run._'
            const marker = '<!-- pr-build-artifacts -->'
            const body = [
              marker,
              '### 📦 Build artifacts',
              '',
              `Unsigned installers built from \`${context.sha.slice(0, 7)}\` for manual testing before merge.`,
              'Downloading requires being signed in to GitHub. Each link is a zip of that platform installers:',
              '',
              list,
              '',
              `<sub>Updated automatically by the \`package\` job · [workflow run](${runUrl})</sub>`,
            ].join('\n')
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: context.issue.number })
            const existing = comments.find(c => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: context.issue.number, body })
            }
