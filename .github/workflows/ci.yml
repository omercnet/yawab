name: CI

on:
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

      - name: Validate pushed commit
        if: github.event_name == 'push'
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -n "$BEFORE" ] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            pnpm exec commitlint --from "$BEFORE" --to "${{ github.sha }}" --verbose
          else
            echo "Previous commit ($BEFORE) is unavailable (new or force-pushed branch); linting HEAD only."
            pnpm exec commitlint --last --verbose
          fi

  quality:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome (lint + format)
        run: pnpm run check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test with coverage
        run: pnpm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  build:
    name: Build (sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer + main + preload
        run: pnpm run build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install fonts (deterministic text/RTL rendering for screenshots)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-core fonts-noto-color-emoji
          sudo fc-cache -f

      - name: Build app
        run: pnpm run build

      - name: Run Playwright E2E (headless via xvfb)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  package:
    name: Package installers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build: pnpm run build:mac
          - os: windows-latest
            build: pnpm run build:win
          - os: ubuntu-latest
            build: pnpm run build:linux
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds the real installers (dmg / nsis / AppImage + deb) without
      # publishing, so every PR proves the release packaging works. DEBUG is
      # enabled on macOS to capture the electron-builder pnpm collector path.
      - name: Package installers (no publish)
        run: ${{ matrix.build }} --publish never
        env:
          DEBUG: ${{ matrix.os == 'macos-latest' && 'electron-builder' || '' }}
