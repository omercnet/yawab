name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

      - name: Validate pushed commit
        if: github.event_name == 'push'
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -n "$BEFORE" ] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            pnpm exec commitlint --from "$BEFORE" --to "${{ github.sha }}" --verbose
          else
            echo "Previous commit ($BEFORE) is unavailable (new or force-pushed branch); linting HEAD only."
            pnpm exec commitlint --last --verbose
          fi

  quality:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome (lint + format)
        run: pnpm run check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test with coverage
        run: pnpm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  build:
    name: Build (sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer + main + preload
        run: pnpm run build

      - name: Verify app deps are bundled (zero production deps)
        run: pnpm run verify:bundle

  e2e:
    name: End-to-end (Playwright)
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install fonts (deterministic text/RTL rendering for screenshots)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-core fonts-noto-color-emoji
          sudo fc-cache -f

      - name: Build app
        run: pnpm run build

      - name: Run Playwright E2E (headless via xvfb)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  package:
    name: Package installers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CSC_LINK: ${{ secrets.MAC_CSC_LINK || secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD || secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY != '' && format('AuthKey_{0}.p8', secrets.APPLE_API_KEY_ID) || '' }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      DEBUG: ${{ matrix.os == 'macos-latest' && 'electron-builder,electron-notarize*' || '' }}
      CSC_FOR_PULL_REQUEST: ${{ github.event_name == 'pull_request' && 'true' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build: pnpm run build:mac
          - os: windows-latest
            build: pnpm run build:win
          - os: ubuntu-latest
            build: pnpm run build:linux
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write App Store Connect API key
        if: ${{ matrix.os == 'macos-latest' && env.APPLE_API_KEY_CONTENT != '' }}
        shell: bash
        run: |
          printf '%s' "$APPLE_API_KEY_CONTENT" | base64 --decode > "$APPLE_API_KEY"
          chmod 600 "$APPLE_API_KEY"

      - name: Require macOS notarization secrets on main
        if: ${{ matrix.os == 'macos-latest' && github.event_name == 'push' }}
        shell: bash
        run: test -n "$CSC_LINK" && test -n "$CSC_KEY_PASSWORD" && test -n "$APPLE_API_KEY" && test -n "$APPLE_API_KEY_ID" && test -n "$APPLE_API_ISSUER" && test -n "$APPLE_TEAM_ID"

      - name: Package installers (no publish)
        run: ${{ matrix.build }} --publish never

      - name: Verify macOS notarization
        if: ${{ matrix.os == 'macos-latest' && (github.event_name == 'push' || env.APPLE_API_KEY != '') }}
        shell: bash
        run: |
          found=0
          for app_path in dist/mac*/Yawab.app; do
            if [ ! -d "$app_path" ]; then
              continue
            fi
            found=1
            spctl --assess --verbose --type exec "$app_path"
            xcrun stapler validate "$app_path"
            codesign --verify --deep --strict --verbose=2 "$app_path"
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No macOS app bundle found to verify"
            exit 1
          fi

      - name: Upload installers
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: warn
          retention-days: 7

  pr-build-comment:
    name: Comment build artifacts on PR
    needs: package
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const { owner, repo } = context.repo
            const run_id = context.runId
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${run_id}`
            const arts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, { owner, repo, run_id })
            const installers = arts.filter(a => a.name.startsWith('installers-'))
            const list = installers.length
              ? installers.map(a => `- [\`${a.name}.zip\`](${runUrl}/artifacts/${a.id}) — ${(a.size_in_bytes / 1048576).toFixed(1)} MB`).join('\n')
              : '_No installer artifacts were produced by this run._'
            const marker = '<!-- pr-build-artifacts -->'
            const body = [
              marker,
              '### 📦 Build artifacts',
              '',
              `Installers built from \`${context.sha.slice(0, 7)}\` for manual testing before merge.`,
              'Downloading requires being signed in to GitHub. Each link is a zip of that platform installers:',
              '',
              list,
              '',
              `<sub>Updated automatically by the \`package\` job · [workflow run](${runUrl})</sub>`,
            ].join('\n')
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: context.issue.number })
            const existing = comments.find(c => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: context.issue.number, body })
            }
