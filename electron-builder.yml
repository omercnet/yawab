appId: com.yawab.app
productName: Yawab
copyright: Copyright © 2026 Yawab
# The app bundles all JS deps (zero production dependencies) and has no native
# modules, so there is nothing for electron-builder to rebuild.
npmRebuild: false
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{vitest.config.{js,ts},playwright.config.{js,ts}}'
  - '!{biome.json,dev-app-update.yml,CHANGELOG.md,README.md,.editorconfig}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{e2e,coverage,playwright-report,test-results}/*'
asarUnpack:
  - resources/**
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-setup-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-${arch}.${ext}
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: yawab
  category: Utility
  artifactName: ${productName}-${version}-${arch}.${ext}
publish:
  provider: github
  owner: omercnet
  repo: yawab
electronDownload:
  mirror: https://github.com/electron/electron/releases/download/
